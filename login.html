<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKSTORE — Iniciar Sesión</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body class="login-page">

  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-logo">
      <span class="brand">BLACKSTORE</span>
      <span class="tagline">Moda oscura · Estilo único</span>
    </div>

    <div id="error-msg" class="error-msg" role="alert"></div>

    <div class="login-form">
      <div class="form-group">
        <label for="email">Usuario</label>
        <input type="email" id="email" placeholder="admin@blackstore.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-login" id="login-btn">
        <span>INGRESAR</span>
      </button>
    </div>

   
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/login.js"></script>

</body>
</html>
